name: AOJ Command OS – CI / Build / Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_installer:
        description: 'Build Windows installer package'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write   # needed to upload release assets

jobs:
  # ──────────────────────────────────────────────
  # 1. Backend lint + tests
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/app --select E,F,W --ignore E501 || true

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy backend/app --ignore-missing-imports --no-error-summary || true

      - name: Smoke-test startup
        run: |
          cd backend
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from app.main import app
          from app.database import init_db, engine
          init_db()
          print('Backend startup OK')
          "

  # ──────────────────────────────────────────────
  # 2. Frontend build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Node / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. Windows installer package
  # ──────────────────────────────────────────────
  windows-installer:
    name: Windows Installer Package
    runs-on: windows-latest
    needs: [backend, frontend]
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/main'
      ) || (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.build_installer == 'true'
      )

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Run Windows installer script
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          & .\scripts\install_windows.ps1

      - name: Create release package (ZIP)
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -match 'refs/tags/(v.+)') { $Matches[1] } else { 'dev' }
          $pkg = "AOJ-CommandOS-Windows-$version"
          $tmp = Join-Path $env:RUNNER_TEMP $pkg
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          # Copy project files (exclude venv, node_modules, .git)
          $exclude = @('.git','node_modules','.venv','__pycache__','*.pyc')
          Get-ChildItem -Path . -Exclude $exclude | Copy-Item -Destination $tmp -Recurse -Force
          # Copy built frontend dist
          Copy-Item -Path frontend\dist -Destination (Join-Path $tmp 'frontend\dist') -Recurse -Force
          # Zip it
          Compress-Archive -Path $tmp -DestinationPath "$pkg.zip" -Force
          Write-Host "Package created: $pkg.zip"
          echo "PKG_NAME=$pkg" >> $env:GITHUB_ENV

      - name: Upload Windows installer package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: "*.zip"
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          body: |
            ## AOJ Command OS ${{ github.ref_name }}

            ### Windows Installation
            1. Download the ZIP below
            2. Extract to a folder (e.g. `C:\AOJ\`)
            3. Right-click → Run as Administrator: `scripts\install_windows.ps1`
            4. Launch: `scripts\start_aoj_windows.ps1`
            5. Open browser at http://localhost:8000

            See `README.md` in the ZIP for full instructions.

  # ──────────────────────────────────────────────
  # 4. Dependency security scan
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --ignore-vuln GHSA-p5wd-2hjp-fjc3 || true

      - name: Node.js dependency audit
        run: npm audit --audit-level=high || true
        working-directory: frontend
